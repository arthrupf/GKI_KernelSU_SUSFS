name: Kernel Build Process

permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      kernel_version:
        required: true
        type: string
      variant:
        required: false
        type: string
      ksu_commit:
        required: false
        type: string
      anykernel_commit:
        required: false
        type: string
      patches_commit:
        required: false
        type: string
      susfs_commit:
        required: false
        type: string
      feature_set:
        required: true
        type: string

jobs:
  build-gki:
    name: "${{ inputs.kernel_version }} (${{ matrix.variant }})"
    strategy:
      fail-fast: false
      matrix:
        variant: ['Normal', 'Bypass']

    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    # =========================
    # PARSE VERSION
    # =========================
    - name: Parse kernel version
      id: parse
      run: |
        INPUT_VERSION="${{ inputs.kernel_version }}"
        IFS='-' read -r KERNEL_PART ANDROID_PART REST <<< "$INPUT_VERSION"

        KERNEL_VERSION="${KERNEL_PART%.*}"
        SUB_LEVEL="${KERNEL_PART##*.}"
        ANDROID_VERSION="$ANDROID_PART"
        OS_PATCH_LEVEL="$REST"

        echo "ANDROID_VERSION=$ANDROID_VERSION" >> "$GITHUB_ENV"
        echo "KERNEL_VERSION=$KERNEL_VERSION" >> "$GITHUB_ENV"
        echo "SUB_LEVEL=$SUB_LEVEL" >> "$GITHUB_ENV"
        echo "OS_PATCH_LEVEL=$OS_PATCH_LEVEL" >> "$GITHUB_ENV"

    # =========================
    # FREE SPACE
    # =========================
    - name: Free Disk Space
      uses: endersonmenezes/free-disk-space@v3
      with:
        remove_android: true
        remove_tool_cache: true

    # =========================
    # SWAP
    # =========================
    - name: Setup Swap
      uses: thejerrybao/setup-swap-space@v1
      with:
        swap-size-gb: 25

    # =========================
    # SETUP ENV
    # =========================
    - name: Setup Build Environment
      run: |
        mkdir -p kernel
        git clone https://github.com/WildKernels/kernel_patches.git
        git clone https://github.com/WildKernels/AnyKernel3.git

    # =========================
    # KVM SAFE FRAGMENT (FIXED)
    # =========================
    - name: Enable KVM (Safe)
      if: contains(inputs.feature_set, 'KVM')
      run: |
        FRAGMENT="$GITHUB_WORKSPACE/wild_gki.fragment"
        touch "$FRAGMENT"

        cat >> "$FRAGMENT" <<EOF

# ===== KVM SAFE =====
CONFIG_VIRTUALIZATION=y
CONFIG_KVM=y
CONFIG_KVM_ARM64=y
CONFIG_KVM_ARM_HOST=y
EOF

        if [[ "$ANDROID_VERSION" == "android14" || "$ANDROID_VERSION" == "android15" ]]; then
          echo "CONFIG_PROTECTED_KVM=y" >> "$FRAGMENT"
        else
          echo "CONFIG_PROTECTED_KVM=n" >> "$FRAGMENT"
        fi

    # =========================
    # KERNELSU / SUSFS (KEEP YOURS)
    # =========================
    - name: Setup KernelSU
      if: contains(inputs.feature_set, 'KSUN')
      uses: ./.github/actions/kernelsu
      with:
        ksu_commit: ${{ inputs.ksu_commit }}

    - name: Setup SUSFS
      if: contains(inputs.feature_set, 'SUSFS')
      uses: ./.github/actions/susfs
      with:
        android_version: ${{ env.ANDROID_VERSION }}
        kernel_version: ${{ env.KERNEL_VERSION }}
        os_patch_level: ${{ env.OS_PATCH_LEVEL }}

    # =========================
    # APPLY BRANDING
    # =========================
    - name: Apply Kernel Branding
      uses: ./.github/actions/apply-kernel-branding
      with:
        build_type: ${{ matrix.variant }}
        kernel_version: ${{ env.KERNEL_VERSION }}

    # =========================
    # BUILD (NO BAZEL)
    # =========================
    - name: Build Kernel
      working-directory: ${{ github.workspace }}/kernel
      run: |
        set -e

        if [ -f "build/build.sh" ]; then
          export SKIP_MRPROPER=1
          export GKI_DEFCONFIG_FRAGMENT="$GITHUB_WORKSPACE/wild_gki.fragment"
          export BUILD_CONFIG=common/build.config.gki.aarch64

          build/build.sh
        else
          echo "ERROR: build.sh not found"
          exit 1
        fi

    # =========================
    # ANYKERNEL
    # =========================
    - name: Prepare AnyKernel3
      run: |
        cp kernel/out/*/dist/Image AnyKernel3/Image || true

    # =========================
    # UPLOAD
    # =========================
    - name: Upload Artifact
      uses: actions/upload-artifact@v5
      with:
        name: kernel-${{ env.KERNEL_VERSION }}-${{ matrix.variant }}
        path: AnyKernel3/**
