name: Build Kernel Unified

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel Version"
        type: choice
        options:
          - a12-5-10
          - a13-5-15
          - a14-6-1
          - a15-6-6   # Android 15 LTS
          - a16-6-12
        default: a15-6-6
      feature_set:
        description: "Feature Set"
        type: choice
        options: [ KSUN+SUSFS+BBG, KSUN, SUSFS, BBG, None ]
        default: KSUN+SUSFS+BBG

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true

      - name: Setup Swap
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 25

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld llvm gcc-aarch64-linux-gnu git unzip curl

      - name: Export environment
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "CC=clang" >> $GITHUB_ENV
          echo "LD=ld.lld" >> $GITHUB_ENV
          echo "AR=llvm-ar" >> $GITHUB_ENV
          echo "NM=llvm-nm" >> $GITHUB_ENV
          echo "OBJCOPY=llvm-objcopy" >> $GITHUB_ENV
          echo "OBJDUMP=llvm-objdump" >> $GITHUB_ENV
          echo "STRIP=llvm-strip" >> $GITHUB_ENV
          echo "READELF=llvm-readelf" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV

      - name: Clone Android 15 LTS Kernel
        run: |
          git clone https://android.googlesource.com/kernel/common -b android15-6.6-lts --depth 1 kernel

      - name: Add fragment (KVM + Namespaces)
        run: |
          cat <<EOF > wild_gki.fragment
          CONFIG_KVM=y
          CONFIG_KVM_ARM_HOST=y
          CONFIG_USER_NS=y
          CONFIG_PID_NS=y
          # CONFIG_WERROR is not set
          EOF

      - name: Build Kernel
        working-directory: kernel
        run: |
          set -ex
          if [ -f "build/build.sh" ]; then
            GKI_DEFCONFIG_FRAGMENT="$GITHUB_WORKSPACE/wild_gki.fragment" \
            BUILD_CONFIG=common/build.config.gki.aarch64 \
            build/build.sh
          else
            cp "$GITHUB_WORKSPACE/wild_gki.fragment" common/arch/arm64/configs/wild_gki.fragment
            tools/bazel build --config=release --stamp \
              --defconfig_fragment=//common:arch/arm64/configs/wild_gki.fragment \
              //common:kernel_aarch64_dist || \
              make ARCH=$ARCH CC=$CC LD=$LD KCFLAGS="-Wno-gcc-compat -Wno-error" -j$(nproc) Image.gz dtbs modules
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build
          path: |
            arch/arm64/boot/Image.gz
            arch/arm64/boot/dts/*.dtb
            modules
            bazel-bin/common/kernel_aarch64/Image*
