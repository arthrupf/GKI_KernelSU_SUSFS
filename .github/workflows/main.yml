name: Build Kernel Unified

on:
  workflow_dispatch:
    inputs:
      kernel_version:
        description: "Kernel Version"
        type: choice
        options:
          - a12-5-10
          - a13-5-15
          - a14-6-1
          - a15-6-6   # Android 15 LTS
          - a16-6-12
        default: a15-6-6
      feature_set:
        description: "Feature Set"
        type: choice
        options: [ KSUN+SUSFS+BBG, KSUN, SUSFS, BBG, None ]
        default: KSUN+SUSFS+BBG

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Free Disk Space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true

      - name: Setup Swap
        uses: thejerrybao/setup-swap-space@v1
        with:
          swap-size-gb: 8

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc bison flex libssl-dev \
            libncurses5-dev libncursesw5-dev git wget curl zip unzip python3 \
            clang lld

      - name: Prepare configs
        run: |
          mkdir -p arch/arm64/configs
          cp wild_gki.fragment arch/arm64/configs/

      - name: Merge defconfig + fragment
        run: |
          ./scripts/kconfig/merge_config.sh arch/arm64/configs/gki_defconfig arch/arm64/configs/wild_gki.fragment
          make ARCH=arm64 olddefconfig

      - name: Build kernel
        run: |
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC=clang -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.event.inputs.kernel_version }}-${{ github.event.inputs.feature_set }}
          path: arch/arm64/boot/Image.gz-dtb
